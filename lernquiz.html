<!DOCTYPE html>
<html lang="de">
<head>

<title>TÜV AI Agent Builder – Prüfungstrainer (Multiple Select)</title>
<style>
  :root{ --blue:#2563eb; --ink:#1e293b; --muted:#64748b; --bg:#f4f6fb; --card:#fff; --border:#e2e8f0;
         --green:#16a34a; --greenbg:#dcfce7; --red:#dc2626; --redbg:#fee2e2; --amber:#b45309; }
  *{ box-sizing:border-box; }
  body{ font-family:'Segoe UI',system-ui,Arial,sans-serif; background:var(--bg); color:var(--ink); margin:0; line-height:1.5; }
  header{ background:var(--card); border-bottom:3px solid var(--blue); padding:1rem 1.2rem; text-align:center; position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:center; gap:1rem; flex-wrap:wrap; }
  header h1{ margin:0; font-size:1.15rem; }
  #timer{ font-weight:800; font-size:1.1rem; padding:.2rem .7rem; border-radius:8px; background:#eef2f9; color:var(--blue); }
  #timer.warn{ background:var(--redbg); color:var(--red); }
  main{ max-width:840px; margin:0 auto; padding:1.4rem 1.2rem 6rem; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.4rem; margin-bottom:1rem; }
  .card.center{ text-align:center; }
  h2{ margin:.2rem 0 .6rem; }
  p.sub{ color:var(--muted); margin:.2rem 0 1rem; }
  .modebtns{ display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin-top:.6rem; }
  button{ font-size:.95rem; font-weight:700; border:none; border-radius:10px; padding:.7rem 1.3rem; cursor:pointer; }
  .primary{ background:var(--blue); color:#fff; } .primary:hover{ background:#1d4ed8; }
  .ghost{ background:#eef2f9; color:var(--ink); } .ghost:hover{ background:#e2e8f0; }
  .big{ padding:1rem 1.4rem; font-size:1.02rem; }
  .q{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.1rem 1.2rem; margin-bottom:1rem; }
  .q .top{ display:flex; justify-content:space-between; gap:.6rem; align-items:baseline; }
  .q h3{ margin:0 0 .5rem; font-size:1rem; }
  .tag{ font-size:.68rem; font-weight:700; color:var(--blue); background:#eef2f9; padding:.12rem .5rem; border-radius:999px; white-space:nowrap; }
  .meta{ color:var(--muted); font-size:.76rem; margin:-.2rem 0 .6rem; }
  label.opt{ display:flex; gap:.6rem; align-items:flex-start; padding:.55rem .7rem; border:1px solid var(--border); border-radius:8px; margin-bottom:.45rem; cursor:pointer; font-size:.93rem; transition:background .15s; }
  label.opt:hover{ background:#f8fafc; }
  label.opt input{ margin-top:.15rem; width:18px; height:18px; flex-shrink:0; accent-color:var(--blue); }
  .badge{ display:inline-block; font-size:.72rem; font-weight:700; padding:.12rem .55rem; border-radius:999px; margin-left:.5rem; }
  .b-ok{ background:var(--greenbg); color:var(--green); } .b-no{ background:var(--redbg); color:var(--red); }
  .opt.correct{ border-color:var(--green); background:var(--greenbg); }
  .opt.wrong{ border-color:var(--red); background:var(--redbg); }
  .expl{ display:none; margin-top:.5rem; font-size:.85rem; color:#334155; background:#f8fafc; border-left:3px solid var(--blue); padding:.5rem .7rem; border-radius:6px; }
  .bar{ position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); padding:.7rem 1.2rem; display:flex; gap:.8rem; align-items:center; justify-content:center; flex-wrap:wrap; z-index:15; }
  #result{ font-weight:700; font-size:1.02rem; }
  #result .pass{ color:var(--green); } #result .fail{ color:var(--red); }
  .scorebox{ text-align:center; }
  .scorebox .big{ font-size:2.2rem; font-weight:800; }
  .filterrow{ display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; margin-bottom:1rem; }
  select{ padding:.5rem .7rem; border-radius:8px; border:1px solid var(--border); font-size:.9rem; }
  .hidden{ display:none; }
  ul.topics{ columns:2; font-size:.85rem; color:var(--muted); margin:.6rem 0 0; padding-left:1.1rem; }
  @media(max-width:560px){ ul.topics{ columns:1; } }
</style>
</head>

<header>
  <h1>🎓 TÜV AI Agent Builder – Prüfungstrainer</h1>
  <span id="timer" class="hidden"></span>

<main id="app"></main>

<script>
/* ---------- Fragenpool (eigene, prüfungsnahe Formulierungen) ---------- */
const Q=[
{t:"LLM",q:"Was trifft auf große Sprachmodelle (LLMs) zu?",o:["Sie sagen das wahrscheinlichste nächste Token voraus.","Ein- und Ausgabe werden in Tokens gemessen.","Sie besitzen echtes Verständnis und Bewusstsein.","Sie können plausibel klingende, aber falsche Aussagen erzeugen."],c:[0,1,3],e:"LLMs sind statistische Vorhersagemodelle ohne Bewusstsein; Halluzinationen sind möglich."},
{t:"LLM",q:"Was ist das Kontextfenster eines LLM?",o:["Die max. Menge an Tokens (Ein- + Ausgabe), die gleichzeitig verarbeitet wird.","Die Zahl gleichzeitiger Nutzer.","Die Trainingsdauer des Modells.","Bei Überschreitung wird älterer Kontext abgeschnitten."],c:[0,3],e:"Das Kontextfenster begrenzt die gleichzeitig verarbeitbaren Tokens; Überlauf führt zu Abschneiden."},
{t:"LLM",q:"Der Parameter „Temperature“ …",o:["niedrig = deterministischer/fokussierter.","hoch = kreativer/zufälliger.","sollte für Fakten/Klassifikation eher niedrig sein.","bestimmt die Token-Kosten."],c:[0,1,2],e:"Temperature steuert die Zufälligkeit, nicht die Kosten."},
{t:"LLM",q:"Was stimmt zu Tokens?",o:["Ein Token ist oft ein Wortteil.","Kosten und Kontextlimit rechnen in Tokens.","Lange/seltene Wörter erzeugen mehr Tokens.","Ein Token entspricht genau einem Zeichen."],c:[0,1,2],e:"Tokens sind Wortfragmente, nicht einzelne Zeichen."},
{t:"LLM",q:"Wodurch reduziert man Halluzinationen?",o:["Klare Rolle/Anweisung im Prompt.","Belege/Quellen via RAG.","Temperature möglichst hoch.","Bei Unsicherheit an den Menschen eskalieren."],c:[0,1,3],e:"Hohe Temperature erhöht Halluzinationen."},
{t:"LLM/Agent",q:"Welche gehören zu den Bausteinen eines Agenten?",o:["Modell (das Gehirn: plant/entscheidet).","Tools (die Hände: APIs, Code, Web).","Speicher, Planung und Feedback.","Ein eigener physischer Server pro Agent."],c:[0,1,2],e:"Bausteine sind Modell, Tools, Speicher, Planung und Feedback – kein eigener Server nötig."},
{t:"LLM",q:"Was ist ein System Prompt?",o:["Übergeordnete Instruktion für Rolle/Verhalten/Grenzen.","Die erste Nutzernachricht im Chat.","Setzt den Rahmen für alle Antworten.","Die Fehlermeldung der API."],c:[0,2],e:"Der System Prompt definiert den Rahmen des Agenten."},
{t:"LLM",q:"Wann ist RAG statt Fine-Tuning sinnvoll?",o:["Wissen ändert sich häufig / muss aktuell sein.","Antworten sollen belegbar sein.","Kein teures Neutraining gewünscht.","Ein fester Stil soll dauerhaft antrainiert werden."],c:[0,1,2],e:"Für dauerhaften Stil eignet sich eher Fine-Tuning."},
{t:"LLM",q:"Was trifft auf Embeddings zu?",o:["Sie bilden Text als Zahlenvektoren ab.","Ähnliche Bedeutung liegt im Vektorraum nah beieinander.","Gängige OpenAI-Embeddings haben z. B. 1536 Dimensionen.","Ein Embedding ist ein Passwort-Hash."],c:[0,1,2],e:"Embeddings kodieren Bedeutung als Vektor (z. B. 1536 Dim.), kein Hash."},
{t:"LLM",q:"Ordne die Chat-Rollen zu:",o:["system = Rahmen/Regeln.","user = Nutzereingabe.","assistant = Modellantwort.","system = die API-Fehlermeldung."],c:[0,1,2],e:"Die system-Rolle setzt den Rahmen, keine Fehlermeldung."},

{t:"Prompt Eng.",q:"Was gehört in einen guten Prompt?",o:["Klare Rolle.","Kontext + gewünschtes Ausgabeformat.","Beispiele (Few-Shot) bei Bedarf.","Möglichst viele widersprüchliche Anweisungen."],c:[0,1,2],e:"Widersprüche verschlechtern die Ergebnisse."},
{t:"Prompt Eng.",q:"Chain-of-Thought-Prompting …",o:["leitet zu schrittweisem Vorgehen an.","kann komplexe Aufgaben verbessern.","erhöht meist Tokens/Kosten.","garantiert die richtige Antwort."],c:[0,1,2],e:"CoT hilft oft, garantiert aber nichts."},
{t:"Prompt Eng.",q:"Few-Shot-Prompting bedeutet …",o:["Beispiele im Prompt mitgeben.","dem Modell das gewünschte Muster zeigen.","das Modell mit neuen Daten trainieren.","kann Formattreue verbessern."],c:[0,1,3],e:"Few-Shot ist Prompting mit Beispielen, kein Training."},
{t:"Prompt Eng.",q:"Warum strukturierte (JSON-)Ausgabe?",o:["Maschinell weiterverarbeitbar.","Klare, prüfbare Felder.","Weniger Parse-Fehler.","Verhindert jede Halluzination."],c:[0,1,2],e:"Struktur hilft der Verarbeitung, verhindert keine Halluzination."},
{t:"Prompt Eng.",q:"Warum Nutzereingaben klar abgrenzen (z. B. mit Delimitern)?",o:["Trennt Anweisung von Daten.","Reduziert Prompt-Injection-Risiko.","Erhöht die Kosten drastisch.","Macht die Verarbeitung robuster."],c:[0,1,3],e:"Abgrenzung erhöht Robustheit/Sicherheit, nicht die Kosten drastisch."},
{t:"Prompt Eng.",q:"Was verbessert die Prompt-Qualität?",o:["Konkret sagen, was zu tun ist.","Format/Länge vorgeben.","Rollen und Grenzen definieren.","Vage bleiben, damit das Modell frei ist."],c:[0,1,2],e:"Konkretheit schlägt Vagheit."},
{t:"Prompt Eng.",q:"Guardrails im System Prompt …",o:["definieren erlaubtes Verhalten.","können Themen/Aktionen ausschließen.","geben dem Agenten klare Grenzen.","ersetzen jede weitere Sicherheitsmaßnahme."],c:[0,1,2],e:"Guardrails ergänzen, ersetzen aber nicht alle Maßnahmen."},

{t:"Multi-Agent",q:"Was trifft auf ein Multi-Agent-System mit Orchestrator zu?",o:["Ein Orchestrator plant und verteilt Teilaufgaben.","Spezialisierte Rollen reduzieren die Angriffsfläche.","Ein Reviewer kann Ergebnisse prüfen.","Jeder Sub-Agent braucht volle Systemrechte."],c:[0,1,2],e:"Least Privilege gilt auch für Sub-Agenten."},
{t:"Multi-Agent",q:"Vorteile spezialisierter Sub-Agenten?",o:["Klarere Zuständigkeit.","Bessere Wartbarkeit/Testbarkeit.","Fokussiertere Prompts.","Immer geringere Kosten."],c:[0,1,2],e:"Mehr Agenten/Aufrufe können Kosten sogar erhöhen."},
{t:"Multi-Agent",q:"Wie arbeiten Agenten zusammen?",o:["Über definierte Schnittstellen/Nachrichten.","Ein Agent nutzt Output eines anderen als Input.","Ergebnisse können von einem Prüf-Agenten validiert werden.","Nur durch eine gemeinsame GPU."],c:[0,1,2],e:"Zusammenarbeit läuft über Schnittstellen, nicht Hardware."},
{t:"Multi-Agent",q:"Das Supervisor-Worker-Muster …",o:["Supervisor koordiniert, Worker führen aus.","erlaubt parallele Bearbeitung.","kann Teilergebnisse zusammenführen.","braucht keinerlei Fehlerbehandlung."],c:[0,1,2],e:"Fehlerbehandlung bleibt nötig."},
{t:"Multi-Agent",q:"Was ist bei Übergaben (Handoffs) wichtig?",o:["Klarer Kontext-Transfer.","Definierte Zuständigkeit.","Eskalation an den Menschen bei Unklarheit.","Kontext einfach verwerfen."],c:[0,1,2],e:"Kontext muss übergeben, nicht verworfen werden."},
{t:"Multi-Agent",q:"Risiken bei Multi-Agent-Systemen?",o:["Fehler können sich fortpflanzen.","Höhere Komplexität/Kosten.","Schwerer nachvollziehbar.","Grundsätzlich unmöglich abzusichern."],c:[0,1,2],e:"Absicherung ist möglich (Guardrails, Review, Least Privilege)."},
{t:"Multi-Agent",q:"Planung in Agentensystemen bedeutet …",o:["Aufgaben in Teilschritte zerlegen.","Reihenfolge/Abhängigkeiten bestimmen.","Zwischenergebnisse nutzen.","immer alles in einem Schritt lösen."],c:[0,1,2],e:"Agenten planen mehrschrittig."},
{t:"Multi-Agent",q:"Wozu ein Reviewer-/Reflection-Schritt?",o:["Ergebnisse gegen Kriterien prüfen.","Fehler vor der Ausgabe abfangen.","Qualität erhöhen.","Er ersetzt jede menschliche Kontrolle."],c:[0,1,2],e:"Auch mit Review bleibt menschliche Kontrolle sinnvoll."},

{t:"Agent Memory",q:"Was beschreibt Agent-Memory?",o:["Infos über einzelne Aufrufe hinaus speichern.","Kurz- und Langzeitgedächtnis.","Externer Speicher (DB/Vektorstore) erweitert es.","Die GPU-Größe des Servers."],c:[0,1,2],e:"Memory = Informationsspeicherung, nicht Hardware."},
{t:"Agent Memory",q:"Ordne die Memory-Arten zu:",o:["Kurzzeit = aktueller Kontext/Verlauf.","Langzeit = dauerhaft gespeichert.","Langzeit oft in einer Vektor-DB.","Kurzzeit ist unbegrenzt."],c:[0,1,2],e:"Kurzzeit ist durch das Kontextfenster begrenzt."},
{t:"Agent Memory",q:"Vektordatenbanken …",o:["speichern Embeddings.","ermöglichen semantische Ähnlichkeitssuche.","liefern relevante Erinnerungen/Dokumente.","sind klassische SQL-Tabellen."],c:[0,1,2],e:"Vektor-DBs suchen semantisch, nicht rein relational."},
{t:"Agent Memory",q:"Retrieval-Augmented Generation (RAG) …",o:["ruft relevante Dokumente ab und gibt sie als Kontext.","reduziert Halluzinationen durch Belege.","eignet sich für aktuelles/eigenes Wissen.","erfordert ein Neutraining des Modells."],c:[0,1,2],e:"RAG braucht kein Neutraining."},
{t:"Agent Memory",q:"Warum Chunking bei RAG?",o:["Passt in Kontext und Embeddings.","Gezieltere, relevantere Treffer.","Zu große Chunks verwässern die Relevanz.","Es trainiert das Modell neu."],c:[0,1,2],e:"Chunking betrifft die Aufbereitung, nicht das Training."},
{t:"Agent Memory",q:"Was gilt für Text-Embeddings?",o:["Jeder Abschnitt wird auf einen Vektor fester Länge abgebildet.","Gängige OpenAI-Embeddings nutzen z. B. 1536 Dimensionen.","Ähnlichkeit wird über den Vektorabstand berechnet.","Die Dimension ist pro Wort beliebig verschieden."],c:[0,1,2],e:"Ein Embedding-Modell hat eine feste Dimensionszahl."},
{t:"Agent Memory",q:"Wie verbessert man die Trefferqualität bei RAG?",o:["Gute Chunk-Größe.","Re-Ranking der Treffer.","Hybride Suche (semantisch + Stichwort).","Immer alle Dokumente mitgeben."],c:[0,1,2],e:"Alles mitgeben sprengt Kontext/Kosten und senkt Relevanz."},
{t:"Agent Memory",q:"Wozu persistentes Memory?",o:["Nutzerpräferenzen über Sitzungen halten.","Wiederkehrende Fakten wiederverwenden.","Personalisierung ermöglichen.","Es ersetzt jede Datenbank."],c:[0,1,2],e:"Memory ersetzt keine vollwertige DB."},
{t:"Agent Memory",q:"Grenzen von Memory?",o:["Datenschutz bei gespeicherten Personendaten.","Veraltete/irrelevante Erinnerungen.","Kosten und Größe.","Unbegrenzt und kostenlos."],c:[0,1,2],e:"Memory ist weder unbegrenzt noch kostenlos."},

{t:"Integration",q:"Ordne die Integrationsarten zu:",o:["API = aktives Abfragen (Request/Response).","Webhook = ereignisgesteuerter Push.","GraphQL = Client fragt gezielt Felder ab.","Webhook = man fragt aktiv beim Server an."],c:[0,1,2],e:"Webhook ist Push, nicht Pull."},
{t:"Integration",q:"Was trifft auf REST-APIs zu?",o:["Kommunikation über HTTP-Methoden (GET/POST …).","Request und Response, oft als JSON.","Authentifizierung z. B. per API-Key/Token.","Sie sind ereignisgetrieben ohne Anfrage."],c:[0,1,2],e:"REST ist anfragebasiert, nicht Push."},
{t:"Integration",q:"Ein Webhook …",o:["wird durch ein Ereignis ausgelöst.","sendet Daten aktiv an eine Ziel-URL.","eignet sich als Workflow-Trigger.","muss ständig aktiv pollen."],c:[0,1,2],e:"Der Webhook pusht, statt zu pollen."},
{t:"Integration",q:"GraphQL …",o:["lässt Clients genau die benötigten Felder abfragen.","reduziert Over- und Under-Fetching.","nutzt meist einen einzigen Endpunkt.","ist ein LLM-Modell."],c:[0,1,2],e:"GraphQL ist eine Query-Schnittstelle, kein Modell."},
{t:"Integration",q:"Model Context Protocol (MCP) …",o:["ist ein offener Standard zur Anbindung von Tools/Daten an LLMs.","standardisiert Integrationen statt Einzellösungen.","ist ein OpenAI-Modell.","ersetzt die DSGVO."],c:[0,1],e:"MCP ist ein Integrationsstandard, kein Modell/Rechtsrahmen."},
{t:"Integration",q:"Was gilt für MCP?",o:["Server stellen Tools/Ressourcen bereit.","Clients (die LLM-App) nutzen sie standardisiert.","Reduziert individuellen Integrationsaufwand.","Funktioniert nur mit einem einzigen Anbieter."],c:[0,1,2],e:"MCP ist anbieterübergreifend gedacht."},
{t:"Integration",q:"Polling vs. Webhook:",o:["Polling = wiederholtes aktives Nachfragen.","Webhook = Push bei Ereignis.","Webhook spart oft unnötige Anfragen.","Polling ist immer effizienter."],c:[0,1,2],e:"Polling erzeugt oft unnötige Last."},
{t:"Integration",q:"Sicherer API-Zugriff:",o:["Tokens/Keys geheim halten.","Least-Privilege-Scopes wählen.","Keys nicht im Prompt/Klartext-Export.","Key öffentlich im Frontend einbetten."],c:[0,1,2],e:"Keys gehören nicht ins öffentliche Frontend."},
{t:"Integration/n8n",q:"Du willst je nach Nachrichtentyp (Text vs. Sprache) verzweigen. Was stimmt?",o:["Ein Switch-Knoten bildet mehrere Ausgabepfade nach Bedingung.","Ein IF-Knoten bildet eine Ja/Nein-Verzweigung.","Der Switch prüft z. B., ob ein voice- oder text-Feld vorliegt.","Ein Filter-Knoten ist dafür der einzige Weg."],c:[0,1,2],e:"Switch = mehrere Pfade; IF = binär; Filter verwirft Items."},

{t:"HITL",q:"Welche drei Freigabetypen gibt es?",o:["Hart kodiert (technischer Stopp).","Weich durch Prompt (Chat-Rückfrage).","Adaptiv durch Agent (nur bei Unklarheit).","Automatisch ohne jede Kontrolle."],c:[0,1,2],e:"„Ohne Kontrolle“ ist kein Human-in-the-Loop-Typ."},
{t:"HITL",q:"Wann sollte man eine harte Freigabe einsetzen?",o:["Bei hoher finanzieller Auswirkung.","Bei rechtlicher/unwiderruflicher Wirkung.","Wenn Fehler teurer sind als der Automatisierungsgewinn.","Bei jeder trivialen Routine zwingend."],c:[0,1,2],e:"Für triviale Routine reicht adaptive Autonomie."},
{t:"HITL",q:"Bezug zu Art. 22 DSGVO:",o:["keine ausschließlich automatisierte Entscheidung mit erheblicher Wirkung.","rechtfertigt Human-in-the-Loop.","ein Mensch prüft und gibt frei.","verbietet jede Form von KI."],c:[0,1,2],e:"Art. 22 fordert menschliches Eingreifen, kein KI-Verbot."},
{t:"HITL",q:"Ein Send-and-Wait-Freigabeschritt …",o:["pausiert den Workflow technisch.","wartet auf Freigeben/Ablehnen.","verhindert automatischen Versand.","sendet sofort ohne Warten."],c:[0,1,2],e:"Er stoppt bis zur menschlichen Antwort."},
{t:"HITL",q:"Wann sollte ein Agent an den Menschen eskalieren?",o:["Wichtige Angaben fehlen.","Der Bedarf ist zu unklar.","Verdacht auf eingebettete Anweisung (Prompt Injection).","Immer, auch bei klaren, vollständigen Angaben."],c:[0,1,2],e:"Bei klaren Angaben handelt der Agent selbst."},
{t:"HITL",q:"Gutes HITL-Design …",o:["hält Rückfragen gering.","eskaliert nur bei Bedarf.","gibt dem Menschen einen fertigen Entwurf.","fragt bei jedem Schritt nach."],c:[0,1,2],e:"Ständiges Nachfragen frisst den Automatisierungsnutzen."},
{t:"HITL",q:"Passende Freigabe-Kommunikation …",o:["kann per E-Mail (Send-and-Wait) erfolgen.","kann per Chat/Button erfolgen.","sollte klar und nachvollziehbar sein.","muss immer im Sheet getippt werden."],c:[0,1,2],e:"Es gibt mehrere gleichwertige Kanäle."},
{t:"HITL",q:"Warum bleibt der Mensch verantwortlich?",o:["Qualitäts- und Rechtssicherheit.","Haftung/Freigabe liegt beim Menschen.","Der Agent kann irren/halluzinieren.","Weil der Agent nie Texte erzeugen darf."],c:[0,1,2],e:"Der Agent darf Texte erzeugen; der Mensch gibt frei."},

{t:"Use Case",q:"Was kennzeichnet einen guten KI-Agenten-Use-Case?",o:["Wiederkehrende, regel- oder sprachlastige Aufgabe.","Klarer Nutzen/ROI.","Daten und Tools verfügbar.","Einmalige, kreative Einzelentscheidung ohne Muster."],c:[0,1,2],e:"Agentische Automatisierung lohnt bei wiederkehrenden Abläufen."},
{t:"Use Case",q:"Wie priorisiert man Use Cases?",o:["Nutzen vs. Aufwand.","Datenverfügbarkeit.","Risiko/Regulatorik.","Nur nach persönlichem Interesse."],c:[0,1,2],e:"Priorisierung ist nutzen- und machbarkeitsbasiert."},
{t:"Use Case",q:"Welche Aufgaben eignen sich für Agenten?",o:["Strukturierte, wiederholbare Prozesse.","Text-/Sprachverarbeitung.","Recherche/Zusammenfassung.","Rein zwischenmenschliche Vertrauensentscheidungen."],c:[0,1,2],e:"Sensible zwischenmenschliche Entscheidungen bleiben beim Menschen."},
{t:"Use Case",q:"Was ist ein „agentischer Browser“?",o:["Ein KI-gesteuerter Agent, der Webseiten und teils Desktop-Apps bedient.","Kann Aufgaben über die Oberfläche automatisieren.","Ein Plugin, das Seiten nur schneller lädt.","Eine reine Notation für Geschäftsprozesse."],c:[0,1],e:"Ein agentischer Browser steuert Anwendungen aktiv; die anderen beschreiben etwas anderes."},
{t:"Use Case",q:"Wann ist ein Agent NICHT die beste Lösung?",o:["Wenn ein einfaches Skript/Regelsystem reicht.","Wenn kein klarer Nutzen besteht.","Wenn die nötigen Daten fehlen.","Immer, wenn Text vorkommt."],c:[0,1,2],e:"Nicht jede Textaufgabe braucht einen Agenten."},
{t:"Use Case",q:"Machbarkeit prüfen heißt …",o:["Datenzugang klären.","Tools/APIs auf Verfügbarkeit prüfen.","Risiken/Compliance bedenken.","erst nach dem Bau prüfen."],c:[0,1,2],e:"Machbarkeit prüft man vorab."},
{t:"Use Case",q:"Sinnvolles Vorgehen bei einem neuen Use Case?",o:["Klein starten (MVP).","Iterativ verbessern.","Früh evaluieren.","Sofort voll produktiv ohne Test."],c:[0,1,2],e:"Erst testen, dann skalieren."},

{t:"AaaS",q:"Was meint „Agents as a Service“?",o:["Agenten als bereitgestellter, aufrufbarer Dienst.","Zugriff meist über API/Schnittstelle.","Betrieb/Skalierung durch den Anbieter.","Nur lokal ohne Netz nutzbar."],c:[0,1,2],e:"AaaS ist ein bereitgestellter Dienst, i. d. R. über API."},
{t:"AaaS",q:"Was gehört zum Betrieb eines Agenten-Service?",o:["Monitoring/Logging.","Versionierung/Updates.","Fehlerbehandlung/Skalierung.","Einmal starten und nie warten."],c:[0,1,2],e:"Betrieb erfordert laufende Wartung."},
{t:"AaaS",q:"Wichtig für einen produktiven Agenten-Dienst?",o:["Verfügbarkeit/Zuverlässigkeit.","Sicherheit/Zugriffskontrolle.","Nachvollziehbarkeit (Logs).","Beliebige, unkontrollierte Rechte."],c:[0,1,2],e:"Kontrollierte Rechte statt beliebiger."},

/* ---------- App ---------- */
const app=document.getElementById('app');
const bar=document.getElementById('bar');
const timerEl=document.getElementById('timer');
let timerId=null, examRun=null;

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function topics(){ return [...new Set(Q.map(q=>q.t))].sort(); }

function renderHome(){
  clearTimer(); bar.classList.add('hidden'); bar.innerHTML='';
  app.innerHTML =
   '<div class="card center">'+
   '<h2>Willkommen zum Prüfungstrainer</h2>'+
   '<p class="sub">Multiple Select · mehrere Antworten können richtig sein · Wertung nach TÜV-Regel: '+
   '<b>nur vollständig richtig = 1 Punkt</b> (K.O. je Frage).</p>'+
   '<div class="modebtns">'+
     '<button class="primary big" id="startExam">▶ Prüfungssimulation<br><span style="font-weight:500;font-size:.82rem">30 Zufallsfragen · 60 Min · bestanden ab 18/30</span></button>'+
     '<button class="ghost big" id="startPractice">📚 Übungsmodus<br><span style="font-weight:500;font-size:.82rem">alle '+Q.length+' Fragen · kein Timer · nach Thema filterbar</span></button>'+
   '</div>'+
   '<p class="sub" style="margin-top:1.2rem">Fragenpool: <b>'+Q.length+'</b> Fragen aus '+topics().length+' Themengebieten:</p>'+
   '<ul class="topics">'+topics().map(t=>'<li>'+t+'</li>').join('')+'</ul>'+
   '</div>';
  document.getElementById('startExam').addEventListener('click',startExam);
  document.getElementById('startPractice').addEventListener('click',()=>renderPractice('__all__'));
}

function questionHTML(it,idx){
  const nc=it.c.length;
  let h='<div class="q" id="q'+idx+'"><div class="top"><h3>'+(idx+1)+'. '+it.q+'</h3><span class="tag">'+it.t+'</span></div>'+
        '<div class="meta">'+(nc>1?nc+' richtige Antworten':'1 richtige Antwort')+'</div>';
  it.o.forEach((op,oi)=>{ h+='<label class="opt" id="q'+idx+'o'+oi+'"><input type="checkbox" data-q="'+idx+'" data-o="'+oi+'"><span>'+op+'</span></label>'; });
  h+='<div class="expl" id="e'+idx+'"></div></div>';
  return h;
}

function gradeList(list){
  let pts=0;
  list.forEach((it,idx)=>{
    const chosen=[...document.querySelectorAll('input[data-q="'+idx+'"]:checked')].map(x=>+x.dataset.o).sort();
    const correct=[...it.c].sort();
    const ok = chosen.length===correct.length && chosen.every((v,i)=>v===correct[i]);
    if(ok) pts++;
    it.o.forEach((op,oi)=>{
      const lab=document.getElementById('q'+idx+'o'+oi);
      lab.querySelector('input').disabled=true;
      if(it.c.includes(oi)) lab.classList.add('correct');
      else if(lab.querySelector('input').checked) lab.classList.add('wrong');
    });
    const hd=document.querySelector('#q'+idx+' h3');
    hd.insertAdjacentHTML('beforeend','<span class="badge '+(ok?'b-ok':'b-no')+'">'+(ok?'richtig':'falsch')+'</span>');
    const ex=document.getElementById('e'+idx); ex.style.display='block'; ex.textContent=it.e;
  });
  return pts;
}

/* ---- Prüfungssimulation ---- */
function startExam(){
  examRun = shuffle(Q).slice(0, Math.min(30,Q.length));
  app.innerHTML = examRun.map((it,i)=>questionHTML(it,i)).join('');
  bar.classList.remove('hidden');
  bar.innerHTML='<button class="primary" id="submitExam">Prüfung abgeben</button>'+
                '<button class="ghost" id="abortExam">Abbrechen</button>'+
                '<span id="result"></span>';
  document.getElementById('submitExam').addEventListener('click',()=>submitExam(false));
  document.getElementById('abortExam').addEventListener('click',renderHome);
  startTimer(60*60);
  window.scrollTo({top:0});
}
function submitExam(auto){
  clearTimer();
  const pts=gradeList(examRun);
  const total=examRun.length, pass=pts>=18;
  timerEl.classList.add('hidden');
  bar.innerHTML='<button class="primary" id="again">Neue Prüfung</button>'+
                '<button class="ghost" id="home">Startseite</button>'+
                '<span id="result">Ergebnis: <b>'+pts+' / '+total+'</b> '+
                '<span class="'+(pass?'pass':'fail')+'">'+(pass?'✓ bestanden (≥18)':'✗ nicht bestanden (18 nötig)')+'</span>'+
                (auto?' · ⏱ Zeit abgelaufen':'')+'</span>';
  document.getElementById('again').addEventListener('click',startExam);
  document.getElementById('home').addEventListener('click',renderHome);
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---- Übungsmodus ---- */
function renderPractice(topic){
  clearTimer(); timerEl.classList.add('hidden');
  const list = topic==='__all__' ? Q : Q.filter(q=>q.t===topic);
  window.__practice=list;
  let head='<div class="card"><div class="filterrow"><b>Übungsmodus</b>'+
    '<label>Thema: <select id="topicSel"><option value="__all__">Alle ('+Q.length+')</option>'+
    topics().map(t=>'<option value="'+t+'"'+(t===topic?' selected':'')+'>'+t+' ('+Q.filter(q=>q.t===t).length+')</option>').join('')+
    '</select></label><button class="ghost" id="toHome">← Startseite</button></div>'+
    '<span class="sub">'+list.length+' Fragen · nur vollständig richtig zählt.</span></div>';
  app.innerHTML = head + list.map((it,i)=>questionHTML(it,i)).join('');
  bar.classList.remove('hidden');
  bar.innerHTML='<button class="primary" id="evalP">Auswerten</button>'+
                '<button class="ghost" id="resetP">Zurücksetzen</button>'+
                '<span id="result"></span>';
  document.getElementById('topicSel').addEventListener('change',e=>renderPractice(e.target.value));
  document.getElementById('toHome').addEventListener('click',renderHome);
  document.getElementById('resetP').addEventListener('click',()=>renderPractice(topic));
  document.getElementById('evalP').addEventListener('click',()=>{
    const pts=gradeList(list); const pct=Math.round(pts/list.length*100);
    document.getElementById('result').innerHTML='Ergebnis: <b>'+pts+' / '+list.length+'</b> ('+pct+'%)';
    window.scrollTo({top:0,behavior:'smooth'});
  });
  window.scrollTo({top:0});
}

/* ---- Timer ---- */
function startTimer(sec){
  timerEl.classList.remove('hidden');
  let left=sec;
  const upd=()=>{
    const m=String(Math.floor(left/60)).padStart(2,'0'), s=String(left%60).padStart(2,'0');
    timerEl.textContent='⏱ '+m+':'+s;
    timerEl.classList.toggle('warn', left<=300);
    if(left<=0){ submitExam(true); return; }
    left--;
  };
  upd(); timerId=setInterval(upd,1000);
}
function clearTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }

renderHome();
</script>
